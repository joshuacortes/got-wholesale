<div id="listings"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzg6dCPxUoui5TuOqWrLtQ8q06-x_d78td2cZu0siO1XjZbtVSw_XA3BpBJ2_XTG8oCQA/exec";
const countyFilter = "Orange County";

fetch(API)
  .then(res => res.json())
  .then(data => {
    let html = "";

    const filtered = data.filter(item => item["County"] === countyFilter);

    filtered.forEach(item => {
      html += `
        <div class="card">
          <h3>${item["Business Name"]}</h3>
          <p>${item["Description"]}</p>
          <p>${item["Category"]}</p>
        </div>
      `;
    });

    document.getElementById("listings").innerHTML = html;
  });
</script>
