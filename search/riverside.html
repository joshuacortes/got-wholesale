<h1>Riverside Wholesale Listings</h1>

<div id="listings">Loading...</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzg6dCPxUoui5TuOqWrLtQ8q06-x_d78td2cZu0siO1XjZbtVSw_XA3BpBJ2_XTG8oCQA/exec";

fetch(API)
  .then(res => res.json())
  .then(data => {

    const countyFilter = "riverside";

    const filtered = data.filter(item =>
      (item["County"] || "").trim().toLowerCase() === countyFilter
    );

    let html = "";

    if (filtered.length === 0) {
      document.getElementById("listings").innerHTML = "No listings found.";
      return;
    }

    filtered.forEach(item => {
      html += `
        <div class="card">
          <h2>${item["Business Name"] || ""}</h2>
          <p>${item["Description"] || ""}</p>
          <p><b>County:</b> ${item["County"] || ""}</p>
          <p><b>Category:</b> ${item["Category"] || ""}</p>
          <p><b>Phone:</b> ${item["Phone"] || ""}</p>
          <p><b>Address:</b> ${item["Address"] || ""}</p>
          ${
            item["Website / Instagram"]
              ? `<p><a href="${item["Website / Instagram"]}" target="_blank" rel="noopener noreferrer">Visit Website / Instagram</a></p>`
              : ""
          }
        </div>
      `;
    });

    document.getElementById("listings").innerHTML = html;
  })
  .catch(err => {
    document.getElementById("listings").innerHTML = "Error loading listings.";
    console.error(err);
  });
</script>
